apiVersion: apps/v1
kind: Deployment
metadata:
  name: chai-app
  namespace: default
  labels:
    app: chai-app
spec:
  replicas: 2

  selector:
    matchLabels:
      app: chai-app

  template:
    metadata:
      labels:
        app: chai-app

    spec:
      containers:
        - name: chai-app

          # Replace with your Docker image
          image: <your-dockerhub-username>/chai-devops:v1.0.0

          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"

            limits:
              memory: "256Mi"
              cpu: "250m"

